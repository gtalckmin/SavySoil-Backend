services:
  - type: web
    name: SavySoil-Backend
    env: python
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: GEMINI_API_KEY
        scope: run
        sync: false
      - key: GITHUB_PAGES_ORIGIN
        value: "https://gtalckmin.github.io"
        scope: run
      - key: PYTHON_VERSION
        value: "3.11"
